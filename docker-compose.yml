services:
  postgres:
    image: postgres:16-alpine
    container_name: porto-mvp-postgres
    environment:
      POSTGRES_DB: porto_mvp
      POSTGRES_USER: porto
      POSTGRES_PASSWORD: porto
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U porto -d porto_mvp']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: porto-mvp-minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: porto-mvp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c
      "mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-porto-mvp}"
    restart: 'no'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: porto-mvp-app
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://porto:porto@postgres:5432/porto_mvp}
      REPOSITORY_BACKEND: ${REPOSITORY_BACKEND:-prisma}
      ARTIFACT_STORAGE_BACKEND: ${ARTIFACT_STORAGE_BACKEND:-filesystem}
      LANDING_PDF_MODE: ${LANDING_PDF_MODE:-placeholder}
      LANDING_TOKEN_TTL_DAYS: ${LANDING_TOKEN_TTL_DAYS:-30}
      LANDING_ARTIFACT_RETENTION_DAYS: ${LANDING_ARTIFACT_RETENTION_DAYS:-90}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-porto-mvp}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    ports:
      - '${APP_PORT:-3001}:3000'
    volumes:
      - app_outputs:/app/outputs
    command: node dist/main.js

volumes:
  postgres_data:
  minio_data:
  app_outputs: